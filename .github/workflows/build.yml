name: Build BlazeCRT
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.1

    - name: Build Plugin (Release x64)
      run: msbuild BlazeCRT/Win/BlazeCRT.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Commit Compiled Plugin to Repo
      run: |
        mkdir -p Builds
        cp BlazeCRT/Win/x64/Release/BlazeCRT.aex Builds/BlazeCRT.aex
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add Builds/BlazeCRT.aex
        git commit -m "Auto-compiled BlazeCRT.aex" || echo "No changes to commit"
        git push
