name: Build BlazeCRT
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.1

    - name: Build Plugin (Release x64)
      run: msbuild BlazeCRT/Win/BlazeCRT.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Commit Compiled Plugin to Repo
      run: |
        mkdir Builds -Force
        Get-ChildItem -Path . -Filter "*.aex" -Recurse | Copy-Item -Destination Builds/BlazeCRT.aex
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add Builds/BlazeCRT.aex
        git commit -m "Auto-compiled BlazeCRT.aex"
        if ($LASTEXITCODE -eq 0) { git push } else { echo "No changes to commit" }
      shell: powershell
